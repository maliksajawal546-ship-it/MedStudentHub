<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice Platform</title>
</head>
<body>
    <h1>Welcome to the MCQ Practice Platform</h1>
    <p>Test your knowledge with multiple-choice questions.</p>

    <h2>Sample Questions</h2>
    <form>
        <div>
            <label>1. What is the capital of France?</label><br>
            <input type="radio" name="q1" value="a"> a) Berlin<br>
            <input type="radio" name="q1" value="b"> b) Madrid<br>
            <input type="radio" name="q1" value="c"> c) Paris<br>
            <input type="radio" name="q1" value="d"> d) Rome<br>
        </div>
        <div>
            <label>2. What is the largest planet in our Solar System?</label><br>
            <input type="radio" name="q2" value="a"> a) Earth<br>
            <input type="radio" name="q2" value="b"> b) Jupiter<br>
            <input type="radio" name="q2" value="c"> c) Saturn<br>
            <input type="radio" name="q2" value="d"> d) Mars<br>
        </div>
        <div>
            <label>3. What is the chemical symbol for water?</label><br>
            <input type="radio" name="q3" value="a"> a) CO2<br>
            <input type="radio" name="q3" value="b"> b) H2O<br>
            <input type="radio" name="q3" value="c"> c) O2<br>
            <input type="radio" name="q3" value="d"> d) NaCl<br>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
